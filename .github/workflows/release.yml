name: Release

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - '.changeset/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - snapshot
      dry_run:
        description: 'Dry run the release process (release mode only)'
        required: false
        default: false
        type: boolean
      tag:
        description: 'Snapshot dist-tag (snapshot mode only)'
        required: false
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - next

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@uturi'

      - name: Upgrade npm (npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions in snapshot mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'snapshot' }}
        run: pnpm changeset version --snapshot ${{ inputs.tag }}

      - name: Build packages
        run: pnpm build

      - name: Show Changeset Status (Dry Run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' && inputs.dry_run }}
        run: pnpm changeset status

      - name: Create Release Pull Request or Publish to npm
        if: ${{ (github.event_name == 'push' || inputs.mode == 'release') && !inputs.dry_run }}
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          title: 'release: version packages'
          commit: 'release: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC(Trusted Publishing) 사용(issue #1152)
          NPM_TOKEN: ''

      - name: Publish snapshot to npm
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'snapshot' }}
        run: pnpm changeset publish --tag ${{ inputs.tag }}

      - name: Show published snapshot versions
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'snapshot' }}
        run: |
          echo "Snapshot release finished."
          echo "tag:   ${{ inputs.tag }}"
